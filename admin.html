<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>

<body>

  <h2>🍔 Restaurant Admin Panel</h2>

  <input id="name" placeholder="Product Name">
  <input id="price" placeholder="Price">

  <button onclick="addProduct()">➕ Add Product</button>

  <h3>Products List</h3>
  <div id="list"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <script>
    // Firebase Config (same as your project)
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDrKceKineg9YA2-o6zfupZTjox4O49OSg",
  authDomain: "restaurant-website-661c9.firebaseapp.com",
  projectId: "restaurant-website-661c9",
  storageBucket: "restaurant-website-661c9.firebasestorage.app",
  messagingSenderId: "810764461242",
  appId: "1:810764461242:web:bbea927d4178786989ce83",
  measurementId: "G-DSHTZ2MHT4"
};
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ➕ Add Product
    function addProduct() {
      let name = document.getElementById("name").value;
      let price = document.getElementById("price").value;

      db.collection("products").add({
        name: name,
        price: price
      });

      alert("Product Added!");
      loadProducts();
    }

    // 📄 Load Products
    function loadProducts() {
      document.getElementById("list").innerHTML = "";

      db.collection("products").get().then((snapshot) => {
        snapshot.forEach((doc) => {
          let data = doc.data();

          document.getElementById("list").innerHTML += `
            <p>
              🍔 ${data.name} - Rs ${data.price}
              <button onclick="deleteProduct('${doc.id}')">Delete</button>
            </p>
          `;
        });
      });
    }

    // ❌ Delete Product
    function deleteProduct(id) {
      db.collection("products").doc(id).delete();
      loadProducts();
    }

    loadProducts();
  </script>

</body>
</html>
